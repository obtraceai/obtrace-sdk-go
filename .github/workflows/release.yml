name: Release

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: obtrace-runners
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi
          if [ "$(git rev-parse "$LATEST" 2>/dev/null)" = "$(git rev-parse HEAD)" ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$NEXT"
            git push origin "$NEXT"
            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    if: >-
      always() &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.created == 'true'))
    needs: [auto-tag]
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref_name }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...
      - name: Install GitHub CLI
        run: |
          type gh >/dev/null 2>&1 && exit 0
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update && sudo apt-get install -y gh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ needs.auto-tag.outputs.tag || github.ref_name }}" --generate-notes
